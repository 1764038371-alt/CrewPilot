databases:
  - name: crewpilot-db
    plan: free
    databaseName: crewpilot
    user: crewpilot

services:
  - type: web
    name: crewpilot-api
    plan: free
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crewpilot-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://crewpilot-web.onrender.com,http://localhost:3000,http://127.0.0.1:3000
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: none
      - key: RUN_SEED_DATA
        value: "true"
      - key: OPTIMIZATION_SOLVER
        value: ortools
      - key: CREWPILOT_LOGIN_PASSWORD
        sync: false
      - key: CREWPILOT_ADMIN_EMAIL
        sync: false

  - type: web
    name: crewpilot-web
    plan: free
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: same-origin
      - key: API_PROXY_TARGET
        value: https://crewpilot-api.onrender.com
