databases:
  - name: crewpilot-db
    databaseName: crewpilot
    user: crewpilot

services:
  - type: web
    name: crewpilot-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crewpilot-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: none
      - key: RUN_SEED_DATA
        value: "true"
      - key: OPTIMIZATION_SOLVER
        value: ortools
      - key: CREWPILOT_LOGIN_PASSWORD
        sync: false

  - type: web
    name: crewpilot-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
